# cargo-deny configuration — license / advisory / source gating.
# Run: cargo deny check

[advisories]
version = 2
yanked = "warn"
ignore = [
    # `paste` is unmaintained (no vulnerability), pulled in transitively via tokenizers.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Allow-list: only permissive licenses compatible with MIT OR Apache-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# argus-shared is consumed as a git dependency until it is published.
allow-git = ["https://github.com/hedone21/argus-shared"]
