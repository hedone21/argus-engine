name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily, so newly-published advisories surface in the cargo-deny job.
    - cron: "0 6 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            args: ""
          - label: +resilience
            args: "--features resilience"
          - label: +caote
            args: "--features caote"
          - label: +rkv
            args: "--features rkv"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev
      - uses: Swatinem/rust-cache@v2
      - name: build (${{ matrix.label }})
        run: cargo build --release --bin argus-cli --bin argus-chat ${{ matrix.args }}

  cuda:
    # The CUDA backends (discrete-GPU `cuda` + Jetson-UMA `cuda-embedded`) compile + lint on a
    # GPU-less runner with no CUDA toolkit installed: cudarc's `fallback-dynamic-loading` skips
    # build-time linking against libcuda, and the `.cu` kernels are compiled at runtime (there is
    # no build-time nvcc). Device correctness is verified manually on real GPUs — this leg exists
    # only to stop the cfg-gated CUDA paths (invisible to the default OpenCL clippy/build jobs
    # above) from bit-rotting. clippy is used rather than a plain build because it is a superset:
    # it compiles *and* lints (the discrete `cuda` and `cuda-embedded` code had never been linted
    # before this leg). `profile` is included to match the default feature shape (`opencl,profile`);
    # without it the orthogonal, repo-wide profile-off `let_unit_value` lints (from the `qcf_timer!`
    # macro) would fire here and drown out genuine CUDA regressions. `--no-default-features` drops
    # OpenCL, so no `ocl-icd-opencl-dev` apt install is needed.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cuda
            args: "--features cuda,profile"
          - label: cuda-embedded
            args: "--features cuda-embedded,profile"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (${{ matrix.label }})
        run: cargo clippy -p argus-engine --no-default-features ${{ matrix.args }} --lib --bins -- -D warnings

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            args: ""
          - label: +rkv,caote
            args: "--features rkv,caote"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev
      - uses: Swatinem/rust-cache@v2
      # Host unit + integration tests. CI runners have no GPU: OpenCL-backed tests
      # self-skip when no platform initializes, and model-fixture tests skip when
      # the model files are absent. `--no-fail-fast` surfaces every failure at once.
      # The `+rkv,caote` leg additionally runs the feature-gated tests (the two
      # features together, exercising the StageCaps `reads` take-both interaction);
      # the default-features leg alone never compiles or runs them. The `build`
      # matrix compiles +caote/+rkv/+resilience separately but runs no tests.
      - name: test (${{ matrix.label }})
        run: cargo test --workspace --no-fail-fast ${{ matrix.args }}

  docs-lint:
    # Public-facing docs/comments must be English. Scope grows as the i18n burndown
    # progresses; it currently covers the fully-translated surfaces.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No Korean under crates/argus-extension-api (public extension API)
        run: |
          # Allow the one Korean token in the README language-switcher link
          # (`[한국어](...)`), mirroring the CONTEXT.md carve-out below.
          if grep -rnP '[\x{AC00}-\x{D7A3}]' crates/argus-extension-api | grep -vF '한국어]('; then
            echo "::error::Korean found under crates/argus-extension-api — the public API surface must be English"
            exit 1
          fi
      - name: CONTEXT.md is English (Korean lives in CONTEXT.ko.md)
        run: |
          if grep -nP '[\x{AC00}-\x{D7A3}]' CONTEXT.md | grep -vF '](CONTEXT.ko.md)'; then
            echo "::error::Korean found in CONTEXT.md outside the language switcher — keep the canonical glossary English"
            exit 1
          fi

  cargo-deny:
    # Enforce deny.toml (advisories / licenses / bans / sources). Also runs on the
    # daily schedule so new RUSTSEC advisories fail CI even without a code change.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          log-level: warn
